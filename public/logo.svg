<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Thin circle (shifted right and down) -->
  <circle cx="110" cy="110" r="60" stroke="url(#gradient)" stroke-width="3" fill="none"/>

  <!-- Thick circle (shifted left and up) -->
  <circle cx="90" cy="90" r="60" stroke="url(#gradient)" stroke-width="12" fill="none"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
